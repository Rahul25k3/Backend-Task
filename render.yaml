services:
  - type: web
    name: bitespeed-identity
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -c "from app import init_db; init_db()" && gunicorn --bind 0.0.0.0:$PORT --workers 1 app:app
    envVars:
      - key: DATABASE_PATH
        value: /tmp/contacts.db
